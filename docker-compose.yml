services:

  # قاعدة البيانات - مايسكل
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: auth_demo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # تحميل ملف الـ SQL تلقائيًا أول مرة فقط عند إنشاء الحاوية
      - ./127_0_0_1.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # الواجهة الخلفية - نود جي إس / إكسبريس
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: auth_demo
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

  # الواجهة الأمامية - رياكت
  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  db_data:
